name: CI
on: [push, pull_request]
defaults:
  run:
    shell: bash
env:
  PEXRC_INSTALL_TOOLS: 1

concurrency:
  group: CI-${{ github.ref }}
  # Queue on all branches and tags, but only cancel overlapping PR burns.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/') }}

jobs:
  setup:
    name: Check GitHub Organization
    if: github.repository_owner == 'pex-tool'
    runs-on: ubuntu-slim
    steps:
      - name: Noop
        if: false
        run: echo "This is a dummy step that will never run."

  checks:
    name: "Check Formatting and Lints"
    needs: setup
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Pexrc
        uses: actions/checkout@v6
      - name: Check Formatting, Lints and Cross-build
        run: |
          rustup toolchain add nightly -c rustfmt
          cargo +nightly fmt --check --all
          cargo --color always clippy --locked --all

  setup-cross-build:
    name: "Setup Cross-build Matrix"
    runs-on: ubuntu-24.04-arm
    needs: setup
    outputs:
      targets: ${{ steps.create-matrix.outputs.matrix }}
    steps:
      - name: Checkout Pexrc
        uses: actions/checkout@v6
      - name: Build Package Tool
        run: cargo --color always build --release -p package
      - name: Upload package binary
        uses: actions/upload-artifact@v7
        with:
          name: package
          path: |
            target/release/package
            .gitignore
      - name: Create Matrix
        id: create-matrix
        run: |
          CHUNK_SIZE=2
          echo matrix=$(
            target/release/package --print-targets json | \
              jq -c --arg cs $CHUNK_SIZE '
                {
                  include: [
                    . | length as $len
                    | range(0; $len; $cs | tonumber) as $idx
                    | {
                      shard: (
                        ($idx / ($cs | tonumber)) + 1 | tostring
                        + " of "
                        + (($len / ($cs | tonumber)) | ceil | tostring)
                      ),
                      targets: .[$idx:$idx+($cs | tonumber)] | map("--target " + .) | join(" ")
                    }
                  ]
                }
              '
          ) >> "$GITHUB_OUTPUT"

  cross-build:
    name: "Cross-build pexrc - shard ${{ matrix.shard }}"
    needs: setup-cross-build
    runs-on: ubuntu-24.04-arm
    # N.B.: We break these up just to save wall time; they all can be built on 1 machine in ~40
    # minutes; this gets us to a ~15 minute long-pole using CHUNK_SIZE=2 in setup-cross-build.
    strategy:
      matrix: ${{ fromJSON(needs.setup-cross-build.outputs.matrix) }}
    steps:
      - name: Checkout Pexrc
        uses: actions/checkout@v6
      - name: Download package binary
        uses: actions/download-artifact@v7
        with:
          name: package
      - name: Build pexrc binary for all targets.
        run: |
          chmod +x target/release/package
          export CARGO="$(command -v cargo)"
          target/release/package \
            --color always --profile release -o dist ${{ matrix.targets }}
      - name: Generate Release Hashes Manifest.
        run: uv run dev-cmd --color always generate-release-hashes -- -i dist

  tests:
    name: "${{ matrix.name }} tests"
    needs: setup
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # N.B.: macos-14 is the oldest non-deprecated ARM Mac runner.
        include:
          - name: Linux aarch64
            os: ubuntu-22.04-arm
          - name: Linux x86_64
            os: ubuntu-22.04
          - name: Mac aarch64
            os: macos-14
          - name: Mac x86_64
            os: macos-x86_64
          - name: Windows aarch64
            os: windows-11-arm
          - name: Windows x86_64
            os: windows-2022
    steps:
      - name: Checkout Pexrc
        uses: actions/checkout@v6
      - name: Run Tests
        run: |
          cargo --color always test --all
          PEXRC_PROFILE=release uv run dev-cmd --color always test -- -vvs

  final-status:
    name: Gather Final Status
    needs:
      - checks
      - cross-build
      - tests
    runs-on: ubuntu-slim
    steps:
      - name: Check Non-Success
        if: |
          contains(needs.*.result, 'cancelled') ||
          contains(needs.*.result, 'failure') ||
          contains(needs.*.result, 'skipped')
        run: "false"
      - name: Success
        run: "true"
